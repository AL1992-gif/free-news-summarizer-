<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#07111f"><title>Signal Brief</title><style>
:root{--bg:#06101d;--panel:#0d1a2b;--line:rgba(255,255,255,.1);--text:#f4f7fb;--muted:#93a4bb;--blue:#5aa7ff;--cyan:#38e0ca;--warn:#ffd166}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 15% 0,rgba(50,115,220,.28),transparent 35%),var(--bg);color:var(--text);font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.app{max-width:1040px;margin:auto;padding:28px 18px 80px}.top{display:flex;align-items:center;gap:12px}.logo{width:46px;height:46px;border-radius:15px;background:linear-gradient(135deg,var(--blue),var(--cyan));display:grid;place-items:center;color:#04101c;font-weight:900}.title{font-size:20px;font-weight:800}.sub{font-size:12px;color:var(--muted)}.search{display:grid;grid-template-columns:1fr auto;gap:10px;margin:22px 0}.search input{border:1px solid var(--line);background:rgba(13,26,43,.9);color:white;padding:15px 16px;border-radius:15px;outline:none;font-size:15px}.search button{border:0;border-radius:15px;padding:0 20px;background:linear-gradient(135deg,var(--blue),var(--cyan));font-weight:850;color:#04101c;cursor:pointer}.presets{display:flex;gap:8px;overflow:auto;margin-top:-12px;margin-bottom:18px}.preset{white-space:nowrap;border:1px solid var(--line);background:rgba(255,255,255,.04);color:#c9d5e5;padding:8px 11px;border-radius:999px;cursor:pointer}.hero{border:1px solid var(--line);background:linear-gradient(145deg,rgba(90,167,255,.15),rgba(56,224,202,.05)),var(--panel);border-radius:23px;padding:20px}.kicker{font-size:11px;color:var(--cyan);font-weight:800;letter-spacing:.12em}.hero h1{font-size:25px;margin:8px 0}.hero p{color:#d4deeb;line-height:1.55;margin:0}.meta{font-size:12px;color:var(--muted);margin-top:12px}.themes{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}.theme{font-size:12px;border-radius:999px;padding:7px 10px;background:rgba(90,167,255,.12);color:#b9d8ff}.section{display:flex;justify-content:space-between;align-items:center;margin:24px 2px 10px}.section h2{font-size:16px;margin:0}.section span{font-size:12px;color:var(--muted)}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.card{display:block;text-decoration:none;color:inherit;border:1px solid var(--line);background:rgba(13,26,43,.88);border-radius:17px;padding:15px;transition:.2s}.card:hover{transform:translateY(-2px);border-color:rgba(90,167,255,.5)}.source{font-size:11px;color:var(--cyan)}.card h3{font-size:14px;line-height:1.4;margin:8px 0}.desc{font-size:12px;color:var(--muted);line-height:1.45}.time{font-size:11px;color:#71849c;margin-top:10px}.watch{margin-top:10px;padding:15px;border-left:3px solid var(--warn);background:rgba(255,209,102,.07);border-radius:0 14px 14px 0;color:#dce5ef;line-height:1.5;font-size:13px}.status{text-align:center;color:var(--muted);padding:32px}.error{color:#ff8b96}.footer{font-size:11px;color:#71849c;margin-top:24px;text-align:center}@media(max-width:700px){.grid{grid-template-columns:1fr}.hero h1{font-size:21px}.search{grid-template-columns:1fr}.search button{height:48px}.app{padding-top:20px}}</style></head><body><main class="app"><div class="top"><div class="logo">S</div><div><div class="title">Signal Brief</div><div class="sub">免费新闻聚合与规则摘要 · 无 API Key</div></div></div><div class="search"><input id="topic" value="Australia financial markets" placeholder="输入主题"><button id="go">生成简报</button></div><div class="presets"><button class="preset">Australia financial markets</button><button class="preset">RBA interest rates</button><button class="preset">ASX market</button><button class="preset">artificial intelligence</button><button class="preset">Sea-Doo Yamaha Kawasaki</button></div><div id="output"><div class="status">正在读取新闻…</div></div><div class="footer">数据来自 Google News RSS。摘要由关键词频率和标题相关度规则生成，不调用付费 AI。</div></main><script>
const $=id=>document.getElementById(id),out=$("output"),esc=s=>{const d=document.createElement("div");d.textContent=s||"";return d.innerHTML};function fmt(d){try{return new Intl.DateTimeFormat("zh-CN",{month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"}).format(new Date(d))}catch{return d||""}}async function load(topic){out.innerHTML='<div class="status">正在抓取并分析最新新闻…</div>';try{const r=await fetch(`/api/news?topic=${encodeURIComponent(topic)}&count=14`),data=await r.json();if(!r.ok)throw new Error(data.error||"请求失败");const b=data.brief,t=b.topStory;out.innerHTML=`<section class="hero"><div class="kicker">TOP STORY</div><h1>${esc(t?.title||"暂无新闻")}</h1><p>${esc(t?.description||"已根据标题和公开摘要识别当前最相关报道。")}</p><div class="meta">${esc(t?.source||"")} · ${fmt(t?.publishedAt)}</div><div class="themes">${b.themes.map(x=>`<span class="theme">${esc(x)}</span>`).join("")}</div></section><div class="watch"><b>接下来关注：</b> ${esc(b.watch)}</div><div class="section"><h2>新闻快报</h2><span>${b.count} 条 · ${fmt(b.generatedAt)}</span></div><section class="grid">${b.headlines.map(a=>`<a class="card" href="${esc(a.link)}" target="_blank" rel="noopener"><div class="source">${esc(a.source)}</div><h3>${esc(a.title)}</h3><div class="desc">${esc(a.description||"点击阅读原文")}</div><div class="time">${fmt(a.publishedAt)}</div></a>`).join("")}</section>`}catch(e){out.innerHTML=`<div class="status error">加载失败：${esc(e.message)}</div>`}}$("go").onclick=()=>load($("topic").value.trim());$("topic").addEventListener("keydown",e=>{if(e.key==="Enter")$("go").click()});document.querySelectorAll(".preset").forEach(b=>b.onclick=()=>{$("topic").value=b.textContent;load(b.textContent)});load($("topic").value);
</script></body></html>
